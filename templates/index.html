<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Prevent auto-zooming on mobile devices -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>10th Social Textbook Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                <h1>Social Studies Assistant</h1>
            </div>
            <p>Ask any question from the 10th-grade textbook</p>
        </header>

        <main class="chat-box" id="chat-box">
            <!-- Initial welcome message -->
            <div class="message bot">
                <div class="message-content">
                    Hello! I'm your study assistant. What topic from the 10th-grade Social textbook can I help you with today?
                </div>
            </div>
        </main>

        <div class="loading-indicator" id="loading">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <footer class="input-area">
            <form id="query-form">
                <input type="text" id="question-input" placeholder="Type your question..." autocomplete="off" required>
                <button type="submit" id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const queryForm = document.getElementById('query-form');
        const questionInput = document.getElementById('question-input');
        const loadingIndicator = document.getElementById('loading');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            
            const contentDiv = document.createElement('div');
            contentDiv.classList.add('message-content');
            contentDiv.textContent = text; 
            
            messageDiv.appendChild(contentDiv);
            chatBox.appendChild(messageDiv);
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        queryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const question = questionInput.value.trim();
            if (!question) return;

            appendMessage('user', question);
            questionInput.value = '';
            
            loadingIndicator.style.display = 'flex';
            questionInput.disabled = true;
            sendBtn.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Something went wrong');
                }

                appendMessage('bot', data.answer);
            } catch (error) {
                appendMessage('bot', `Error: ${error.message}`);
            } finally {
                loadingIndicator.style.display = 'none';
                questionInput.disabled = false;
                sendBtn.disabled = false;
                // Use a slight timeout for focus to prevent keyboard jumping on mobile
                setTimeout(() => questionInput.focus(), 100);
            }
        });
    </script>
</body>
</html>
